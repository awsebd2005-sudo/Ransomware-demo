<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Locked</title>

<style>
body{
    margin:0;
    background:#8b0000;
    color:white;
    font-family:Arial,Helvetica,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:700px;
    background:#b30000;
    border-radius:15px;
    padding:40px;
    text-align:center;
    box-shadow:0 0 40px rgba(0,0,0,.6);
}

h1{
    font-size:48px;
    margin-bottom:15px;
}

.warning{
    font-size:22px;
    margin-bottom:30px;
}

.info{
    font-size:18px;
    line-height:1.7;
    margin-bottom:30px;
}

.payment{
    background:white;
    color:#b30000;
    display:inline-block;
    padding:15px 30px;
    font-size:28px;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
}

.payment:hover{
    transform:scale(1.05);
}

.timer{
    margin-top:30px;
    font-size:24px;
}

.note{
    margin-top:40px;
    color:#ffd6d6;
    font-size:14px;
}

#paymentBox{
    display:none;
    margin-top:30px;
    background:white;
    color:black;
    padding:25px;
    border-radius:10px;
}

#paymentBox input,
#paymentBox textarea{
    width:90%;
    padding:10px;
    margin:8px;
    font-size:16px;
}

#paymentBox button{
    padding:12px 30px;
    font-size:18px;
    background:#b30000;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

#jokeMessage{
    display:none;
    font-size:36px;
    font-weight:bold;
    color:#00ff66;
    padding: 40px 0;
}
</style>

</head>

<body>

<div class="box" id="mainBox">

<h1>⚠️ YOUR FILES ARE ENCRYPTED ⚠️</h1>

<div class="info">
Your personal files have been encrypted.<br>
To restore access, send <b>0.01 BTC</b> to the wallet below.
</div>

<div class="payment" id="payButton">
PAY NOW
</div>

<div id="paymentBox">

<h2>Payment Details</h2>

<p>Please complete the information below.</p>

<input type="text" placeholder="Full Name">

<input type="text" placeholder="IBAN">

<input type="text" placeholder="Bank Name">

<input type="text" placeholder="Account Number">

<input type="text" placeholder="Reference Number">

<textarea placeholder="Additional Notes"></textarea>

<br>

<button id="submitPayment">
Pay
</button>

</div>

<div id="jokeMessage">
Just Kidding! 😜<br><br>
This was only a ransomware awareness demonstration.
</div>

<div class="timer">
Time Remaining<br>
<span id="timer">05:00</span>
</div>

</div>

<script>

// Countdown Timer

let time = 5 * 60;

let timer = document.getElementById("timer");

let countdown = setInterval(function(){

    let minutes = Math.floor(time / 60);
    let seconds = time % 60;

    minutes = minutes < 10 ? "0" + minutes : minutes;
    seconds = seconds < 10 ? "0" + seconds : seconds;

    timer.textContent = minutes + ":" + seconds;

    time--;

    if(time < 0){
        clearInterval(countdown);
        timer.textContent = "TIME EXPIRED";
    }

},1000);

// Payment Form

const payButton = document.getElementById("payButton");
const paymentBox = document.getElementById("paymentBox");
const submitPayment = document.getElementById("submitPayment");
const jokeMessage = document.getElementById("jokeMessage");
const mainBox = document.getElementById("mainBox");

payButton.addEventListener("click",function(){

    paymentBox.style.display="block";

});

submitPayment.addEventListener("click",function(){

    // Stop the countdown timer
    clearInterval(countdown);

    // Clear everything inside the main box and show only the joke message
    mainBox.innerHTML = "";
    jokeMessage.style.display = "block";
    mainBox.appendChild(jokeMessage);

});

</script>

</body>
</html>
