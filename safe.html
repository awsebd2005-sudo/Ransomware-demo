<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safe Zone</title>

<style>
body{
    margin:0;
    background:#0b7d3e;
    font-family:Arial,Helvetica,sans-serif;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:650px;
    background:#138f49;
    padding:50px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 35px rgba(0,0,0,.4);
}

h1{
    font-size:55px;
    margin-bottom:20px;
}

p{
    font-size:24px;
    line-height:1.6;
}

.badge{
    display:inline-block;
    margin-top:30px;
    background:white;
    color:#138f49;
    padding:18px 35px;
    border-radius:12px;
    font-size:28px;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="box">

<h1>✅ SAFE REGION</h1>

<p>
Good choice.
</p>

<p>
You selected the safe QR code.
No malware was executed.
Your files remain protected.
</p>

<div class="badge">
System Secure
</div>

</div>

</body>
</html>
